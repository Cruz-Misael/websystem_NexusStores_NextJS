<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Nexus Store — Post 5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', sans-serif; background: #09090b; }

    .slide { width: 1080px; height: 1080px; position: relative; overflow: hidden; background: #09090b; }

    .blob { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .blob-1 { width: 750px; height: 750px; background: #1e1b4b; opacity: .38; bottom: -250px; right: -200px; }
    .blob-2 { width: 450px; height: 400px; background: #312e81; opacity: .22; top: -100px; left: -80px; }
    .blob-3 { width: 260px; height: 260px; background: #6366f1; opacity: .12; top: 42%; left: 45%; transform: translate(-50%, -50%); }

    .inner { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 72px; }

    .logo-mark { display: inline-flex; align-items: center; gap: 14px; }
    .logo-icon {
      width: 50px; height: 50px; background: #4f46e5; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(79, 70, 229, .50); flex-shrink: 0;
    }
    .logo-text { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -.5px; }

    .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 44px; }

    .eyebrow { font-size: 13px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: #818cf8; margin-bottom: 24px; }
    .title { font-size: 82px; font-weight: 900; line-height: .93; letter-spacing: -4px; color: #fff; margin-bottom: 22px; }
    .title span { color: #818cf8; }
    .sub { font-size: 20px; font-weight: 500; color: #a1a1aa; line-height: 1.5; max-width: 560px; }

    /* Chart mockup */
    .chart-area { display: flex; flex-direction: column; gap: 14px; }
    .chart-row { display: flex; align-items: center; gap: 16px; }
    .chart-label { font-size: 12px; font-weight: 700; color: #52525b; width: 130px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 36px; background: rgba(255,255,255,.04); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,.06); }
    .bar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; padding-left: 14px; }
    .bar-fill.w90 { width: 90%; background: linear-gradient(90deg, #4338ca, #818cf8); }
    .bar-fill.w72 { width: 72%; background: linear-gradient(90deg, #3730a3, #6366f1); }
    .bar-fill.w55 { width: 55%; background: linear-gradient(90deg, #312e81, #4f46e5); }
    .bar-fill.w40 { width: 40%; background: linear-gradient(90deg, #1e1b4b, #3730a3); }
    .bar-value { font-size: 11px; font-weight: 800; color: rgba(255,255,255,.8); letter-spacing: .5px; }

    .footer { display: flex; align-items: center; justify-content: space-between; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(55, 48, 163, .35); border: 1px solid rgba(129, 140, 248, .25);
      border-radius: 999px; padding: 8px 20px;
      font-size: 11px; font-weight: 800; color: #a5b4fc; letter-spacing: 2.5px; text-transform: uppercase;
    }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #818cf8; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: .4 } }

    .tag {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; padding: 14px 22px;
    }
    .tag span { font-size: 13px; font-weight: 600; color: #71717a; }
    .tag strong { color: #fff; }

    .counter { position: absolute; bottom: 44px; right: 52px; display: flex; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #3f3f46; }
    .dot.active { background: #818cf8; width: 26px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="inner">
      <div class="logo-mark">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
            <path d="M 11 15 Q 16 7.5 21 15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <rect x="5" y="14" width="22" height="14" rx="3" stroke="white" stroke-width="2"/>
            <rect x="5" y="14" width="22" height="5.5" rx="3" fill="white" fill-opacity=".2"/>
          </svg>
        </div>
        <span class="logo-text">Nexus Store</span>
      </div>

      <div class="hero">
        <div>
          <p class="eyebrow">✦ &nbsp;Relatórios</p>
          <h1 class="title">Dados que<br />geram<br /><span>decisões.</span></h1>
          <p class="sub">Veja o que mais vende, quem compra mais e onde está o seu lucro — tudo em tempo real.</p>
        </div>

        <div class="chart-area">
          <div class="chart-row">
            <span class="chart-label">Produto A</span>
            <div class="bar-track"><div class="bar-fill w90"><span class="bar-value">R$ 4.200</span></div></div>
          </div>
          <div class="chart-row">
            <span class="chart-label">Produto B</span>
            <div class="bar-track"><div class="bar-fill w72"><span class="bar-value">R$ 3.100</span></div></div>
          </div>
          <div class="chart-row">
            <span class="chart-label">Produto C</span>
            <div class="bar-track"><div class="bar-fill w55"><span class="bar-value">R$ 2.400</span></div></div>
          </div>
          <div class="chart-row">
            <span class="chart-label">Produto D</span>
            <div class="bar-track"><div class="bar-fill w40"><span class="bar-value">R$ 1.800</span></div></div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="badge">
          <div class="badge-dot"></div>
          Nexus Store
        </div>
        <div class="tag">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#71717a" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span>Relatórios em <strong>tempo real</strong></span>
        </div>
      </div>
    </div>

    <div class="counter">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>
  </div>
</body>
</html>
